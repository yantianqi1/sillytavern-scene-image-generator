<div id="scene_image_generator_container" class="scene-image-generator extension_container">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>剧情生图</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="sig-tabs" role="tablist" aria-label="剧情生图设置分类">
                <button class="sig-tab active" type="button" data-tab="generate" role="tab" aria-selected="true">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    生成
                </button>
                <button class="sig-tab" type="button" data-tab="prompt" role="tab" aria-selected="false">
                    <i class="fa-solid fa-pen-nib"></i>
                    提示词
                </button>
                <button class="sig-tab" type="button" data-tab="api" role="tab" aria-selected="false">
                    <i class="fa-solid fa-plug"></i>
                    生图 API
                </button>
                <button class="sig-tab" type="button" data-tab="result" role="tab" aria-selected="false">
                    <i class="fa-solid fa-image"></i>
                    结果
                </button>
                <button class="sig-tab" type="button" data-tab="gallery" role="tab" aria-selected="false">
                    <i class="fa-solid fa-images"></i>
                    图库
                </button>
            </div>

            <section class="sig-tab-panel active" data-tab-panel="generate" role="tabpanel">
                <div class="sig-grid sig-grid-compact">
                    <label>
                        当前生图配置
                        <select id="sig_profile_select"></select>
                    </label>
                    <label>
                        读取最近轮数
                        <input id="sig_context_turns" type="number" min="1" max="20" step="1">
                    </label>
                    <label>
                        生图失败重试次数
                        <input id="sig_image_retry_count" type="number" min="0" max="10" step="1">
                    </label>
                </div>

                <div class="sig-actions">
                    <button id="sig_generate" class="menu_button sig-button" type="button">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        生成
                    </button>
                    <button id="sig_save_general" class="menu_button sig-button" type="button">
                        <i class="fa-solid fa-floppy-disk"></i>
                        保存
                    </button>
                </div>
            </section>

            <section class="sig-tab-panel" data-tab-panel="prompt" role="tabpanel">
                <div class="sig-grid sig-grid-compact">
                    <label>
                        当前提示词预设
                        <select id="sig_prompt_preset_select"></select>
                    </label>
                    <label>
                        预设名称
                        <input id="sig_prompt_preset_name" type="text">
                    </label>
                </div>

                <div class="sig-actions">
                    <button id="sig_add_prompt_preset" class="menu_button sig-button" type="button">
                        <i class="fa-solid fa-plus"></i>
                        新增
                    </button>
                    <button id="sig_save_prompt_preset" class="menu_button sig-button" type="button">
                        <i class="fa-solid fa-floppy-disk"></i>
                        保存
                    </button>
                    <button id="sig_delete_prompt_preset" class="menu_button sig-button" type="button">
                        <i class="fa-solid fa-trash"></i>
                        删除
                    </button>
                </div>

                <label>
                    预设提示词内容
                    <textarea id="sig_preset_prompt" rows="6"></textarea>
                </label>

                <h4>提示词改写模型</h4>
                <div class="sig-grid sig-grid-compact">
                    <label>
                        模式
                        <select id="sig_rewrite_mode">
                            <option value="current">使用当前聊天模型</option>
                            <option value="custom">使用自定义聊天 API</option>
                        </select>
                    </label>
                    <label>
                        温度
                        <input id="sig_rewrite_temperature" type="number" min="0" max="2" step="0.1">
                    </label>
                </div>
                <div class="sig-grid sig-grid-compact">
                    <label>
                        自定义聊天 API 地址
                        <input id="sig_rewrite_api_url" type="text" placeholder="https://api.example.com/v1">
                    </label>
                    <label>
                        自定义聊天模型
                        <input id="sig_rewrite_model" type="text" placeholder="gpt-4o-mini">
                    </label>
                </div>
                <label>
                    自定义聊天 API 密钥
                    <input id="sig_rewrite_api_key" type="password" autocomplete="off">
                </label>
            </section>

            <section class="sig-tab-panel" data-tab-panel="api" role="tabpanel">
                <div class="sig-grid sig-grid-compact">
                    <label>
                        服务类型
                        <select id="sig_provider">
                            <option value="openai-compatible">OpenAI 兼容生图 API</option>
                            <option value="novelai-newapi">NovelAI NewAPI 生图</option>
                        </select>
                    </label>
                </div>
                <div class="sig-grid sig-grid-compact">
                    <label>
                        生图 API 地址 / NewAPI Base URL
                        <input id="sig_image_api_url" type="text" placeholder="https://api.example.com/v1">
                    </label>
                    <label>
                        生图模型
                        <span class="sig-inline-field">
                            <input id="sig_image_model" type="text" list="sig_novelai_model_presets" placeholder="gpt-image-1 / nai-diffusion-4-5-full-1024x1024">
                            <select id="sig_image_model_select" class="displayNone" aria-label="NovelAI 生图模型"></select>
                            <button id="sig_fetch_novelai_models" class="menu_button sig-button" type="button" title="从 API 拉取模型列表">
                                <i class="fa-solid fa-cloud-arrow-down"></i>
                                拉取
                            </button>
                        </span>
                        <datalist id="sig_novelai_model_presets">
                            <option value="nai-diffusion-4-5-full-1024x1024"></option>
                            <option value="nai-diffusion-4-5-full-1832x1216"></option>
                            <option value="nai-diffusion-4-5-full-11216x832"></option>
                        </datalist>
                    </label>
                </div>
                <div class="sig-grid sig-grid-compact">
                    <label id="sig_image_size_label">
                        图片尺寸
                        <input id="sig_image_size" type="text" placeholder="1024x1024">
                    </label>
                    <label>
                        返回格式
                        <select id="sig_response_format">
                            <option value="b64_json">b64_json</option>
                            <option value="url">url</option>
                        </select>
                    </label>
                </div>
                <label>
                    生图 API 密钥
                    <input id="sig_image_api_key" type="password" autocomplete="off">
                </label>
                <div id="sig_novelai_fields" class="sig-provider-fields displayNone">
                    <h4>NovelAI NewAPI 参数</h4>
                    <div class="sig-mini-tabs" role="tablist" aria-label="NovelAI 设置分类">
                        <button class="sig-mini-tab active" type="button" data-novelai-tab="params" role="tab" aria-selected="true">
                            参数
                        </button>
                        <button class="sig-mini-tab" type="button" data-novelai-tab="style" role="tab" aria-selected="false">
                            风格
                        </button>
                    </div>

                    <section class="sig-novelai-panel active" data-novelai-panel="params" role="tabpanel">
                        <textarea id="sig_negative_prompt" class="displayNone" spellcheck="false" aria-hidden="true"></textarea>
                        <div class="sig-grid sig-grid-compact">
                            <label>
                                Steps
                                <select id="sig_novelai_steps">
                                    <option value="20">20</option>
                                    <option value="28">28</option>
                                </select>
                            </label>
                            <label>
                                Scale
                                <input id="sig_novelai_scale" type="number" min="1" max="12" step="0.1">
                            </label>
                        </div>
                        <div class="sig-grid sig-grid-compact">
                            <label>
                                Sampler
                                <input id="sig_novelai_sampler" type="text" placeholder="k_euler_ancestral">
                            </label>
                            <label>
                                Seed
                                <input id="sig_novelai_seed" type="number" step="1" placeholder="留空随机">
                            </label>
                        </div>
                        <textarea id="sig_novelai_params" class="displayNone" spellcheck="false" aria-hidden="true"></textarea>
                    </section>

                    <section class="sig-novelai-panel" data-novelai-panel="style" role="tabpanel">
                        <div class="sig-grid sig-grid-compact">
                            <label>
                                当前风格
                                <select id="sig_novelai_style_select"></select>
                            </label>
                            <label>
                                风格名称
                                <input id="sig_novelai_style_name" type="text">
                            </label>
                        </div>
                        <div class="sig-actions">
                            <button id="sig_add_novelai_style" class="menu_button sig-button" type="button">
                                <i class="fa-solid fa-plus"></i>
                                新增
                            </button>
                            <button id="sig_save_novelai_style" class="menu_button sig-button" type="button">
                                <i class="fa-solid fa-floppy-disk"></i>
                                保存
                            </button>
                            <button id="sig_delete_novelai_style" class="menu_button sig-button" type="button">
                                <i class="fa-solid fa-trash"></i>
                                删除
                            </button>
                        </div>
                        <label>
                            正面风格提示词
                            <textarea id="sig_novelai_style_prompt" rows="4" spellcheck="false" placeholder="masterpiece, best quality, cinematic lighting"></textarea>
                        </label>
                        <label>
                            负面提示词
                            <textarea id="sig_novelai_style_negative_prompt" rows="3" spellcheck="false" placeholder="lowres, bad anatomy, bad hands, text, watermark, worst quality, bad quality"></textarea>
                        </label>
                    </section>
                </div>
                <textarea id="sig_extra_params" class="displayNone" spellcheck="false" aria-hidden="true"></textarea>
            </section>

            <section class="sig-tab-panel" data-tab-panel="result" role="tabpanel">
                <label>
                    生成提示词
                    <textarea id="sig_last_prompt" rows="4" readonly></textarea>
                </label>
                <div id="sig_result" class="sig-result displayNone">
                    <img id="sig_result_image" alt="生成的剧情图片">
                </div>
                <div class="sig-actions">
                    <button id="sig_copy_prompt" class="menu_button sig-button" type="button">
                        <i class="fa-solid fa-copy"></i>
                        复制
                    </button>
                    <button id="sig_open_image" class="menu_button sig-button" type="button">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i>
                        打开
                    </button>
                </div>
            </section>

            <section class="sig-tab-panel" data-tab-panel="gallery" role="tabpanel">
                <div class="sig-actions">
                    <button id="sig_refresh_gallery" class="menu_button sig-button" type="button">
                        <i class="fa-solid fa-rotate"></i>
                        刷新
                    </button>
                    <button id="sig_clear_gallery" class="menu_button sig-button" type="button">
                        <i class="fa-solid fa-trash-can"></i>
                        清空
                    </button>
                </div>
                <div id="sig_gallery_usage" class="sig-gallery-usage"></div>
                <div id="sig_gallery_empty" class="sig-empty">还没有保存的生图。</div>
                <div id="sig_gallery" class="sig-gallery" aria-live="polite"></div>
            </section>

            <div id="sig_status" class="sig-status" data-type="info"></div>
        </div>
    </div>
</div>
